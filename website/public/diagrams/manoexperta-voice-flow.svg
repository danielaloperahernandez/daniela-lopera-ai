<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="1280" height="900" fill="#020617"/>

  <!-- Header -->
  <text x="40" y="46" fill="#e2e8f0" font-size="24" font-weight="700">ManoExperta - Voice Agent Flow</text>
  <text x="40" y="70" fill="#94a3b8" font-size="14">Vapi (voice + tool calls) to n8n orchestration: RAG, appointment booking and fault tolerance</text>

  <!-- ===================== BAND 1: Reception ===================== -->
  <rect x="24" y="90" width="1232" height="118" rx="12" fill="#0b1222" stroke="#1e293b"/>
  <rect x="24" y="90" width="5" height="118" rx="2" fill="#6366f1"/>
  <text x="44" y="116" fill="#818cf8" font-size="13" font-weight="700">[01]  RECEPTION AND ROUTING</text>

  <g>
    <rect x="44" y="130" width="120" height="58" rx="9" fill="#111827" stroke="#6366f1" stroke-width="1.5"/>
    <text x="104" y="156" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Caller</text>
    <text x="104" y="174" fill="#94a3b8" font-size="11" text-anchor="middle">phone call</text>

    <rect x="206" y="130" width="158" height="58" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="285" y="156" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Vapi Assistant</text>
    <text x="285" y="174" fill="#94a3b8" font-size="11" text-anchor="middle">speech + tool calls</text>

    <rect x="406" y="130" width="150" height="58" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="481" y="156" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">n8n Webhook</text>
    <text x="481" y="174" fill="#94a3b8" font-size="11" text-anchor="middle">/webhook/vapi-tools</text>

    <rect x="598" y="130" width="150" height="58" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="673" y="156" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Parse Payload</text>
    <text x="673" y="174" fill="#94a3b8" font-size="11" text-anchor="middle">flatten tool call</text>

    <rect x="790" y="130" width="160" height="58" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="870" y="153" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Initialize Call Log</text>
    <text x="870" y="171" fill="#94a3b8" font-size="11" text-anchor="middle">Postgres: IN_PROGRESS</text>

    <rect x="992" y="130" width="160" height="58" rx="9" fill="#0f1830" stroke="#6366f1" stroke-width="1.8"/>
    <text x="1072" y="153" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Tool Router</text>
    <text x="1072" y="171" fill="#94a3b8" font-size="11" text-anchor="middle">switch by tool_name</text>
  </g>

  <g stroke="#475569" stroke-width="2" fill="#475569">
    <line x1="164" y1="159" x2="200" y2="159"/><polygon points="206,159 198,155 198,163"/>
    <line x1="364" y1="159" x2="400" y2="159"/><polygon points="406,159 398,155 398,163"/>
    <line x1="556" y1="159" x2="592" y2="159"/><polygon points="598,159 590,155 590,163"/>
    <line x1="748" y1="159" x2="784" y2="159"/><polygon points="790,159 782,155 782,163"/>
    <line x1="950" y1="159" x2="986" y2="159"/><polygon points="992,159 984,155 984,163"/>
  </g>

  <!-- ===================== BAND 2: RAG ===================== -->
  <rect x="24" y="224" width="1232" height="118" rx="12" fill="#0a1410" stroke="#1e293b"/>
  <rect x="24" y="224" width="5" height="118" rx="2" fill="#10b981"/>
  <text x="44" y="250" fill="#34d399" font-size="13" font-weight="700">[02]  TECHNICAL RAG  -  consultar_manual_rag</text>

  <g>
    <rect x="120" y="266" width="184" height="58" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="212" y="290" fill="#e2e8f0" font-size="12.5" font-weight="700" text-anchor="middle">consultar_manual_rag</text>
    <text x="212" y="308" fill="#94a3b8" font-size="11" text-anchor="middle">args: symptoms, category</text>

    <rect x="350" y="266" width="200" height="58" rx="9" fill="#111827" stroke="#10b981" stroke-width="1.5"/>
    <text x="450" y="290" fill="#e2e8f0" font-size="12.5" font-weight="700" text-anchor="middle">Search Technical KB</text>
    <text x="450" y="308" fill="#94a3b8" font-size="11" text-anchor="middle">Pinecone + Gemini, topK=1</text>

    <rect x="596" y="266" width="200" height="58" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="696" y="290" fill="#e2e8f0" font-size="12.5" font-weight="700" text-anchor="middle">Return safe procedure</text>
    <text x="696" y="308" fill="#94a3b8" font-size="11" text-anchor="middle">safety_warning, solution</text>

    <rect x="842" y="266" width="180" height="58" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="932" y="290" fill="#e2e8f0" font-size="12.5" font-weight="700" text-anchor="middle">Async DB Sync</text>
    <text x="932" y="308" fill="#94a3b8" font-size="11" text-anchor="middle">calls.status = SUCCESS</text>
  </g>

  <g stroke="#10b981" stroke-width="2" fill="#10b981">
    <path d="M1072 188 L1072 206 L212 206 L212 260" fill="none"/><polygon points="212,266 208,258 216,258"/>
  </g>
  <text x="225" y="222" fill="#34d399" font-size="11">tool = consultar_manual_rag</text>
  <g stroke="#475569" stroke-width="2" fill="#475569">
    <line x1="304" y1="295" x2="344" y2="295"/><polygon points="350,295 342,291 342,299"/>
    <line x1="550" y1="295" x2="590" y2="295"/><polygon points="596,295 588,291 588,299"/>
    <line x1="796" y1="295" x2="836" y2="295"/><polygon points="842,295 834,291 834,299"/>
  </g>

  <!-- ===================== BAND 3: Scheduling ===================== -->
  <rect x="24" y="358" width="1232" height="232" rx="12" fill="#15100a" stroke="#1e293b"/>
  <rect x="24" y="358" width="5" height="232" rx="2" fill="#f59e0b"/>
  <text x="44" y="384" fill="#fbbf24" font-size="13" font-weight="700">[03]  SCHEDULING AND BOOKING  -  gestionar_agenda_db</text>

  <g>
    <rect x="60" y="446" width="170" height="58" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="145" y="470" fill="#e2e8f0" font-size="12.5" font-weight="700" text-anchor="middle">gestionar_agenda_db</text>
    <text x="145" y="488" fill="#94a3b8" font-size="11" text-anchor="middle">arg: action</text>

    <rect x="262" y="446" width="150" height="58" rx="9" fill="#0f1830" stroke="#f59e0b" stroke-width="1.8"/>
    <text x="337" y="469" fill="#e2e8f0" font-size="12.5" font-weight="700" text-anchor="middle">Action Router</text>
    <text x="337" y="487" fill="#94a3b8" font-size="10.5" text-anchor="middle">check/book/lookup/cancel</text>

    <rect x="450" y="398" width="190" height="50" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="545" y="418" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">check: offer slots</text>
    <text x="545" y="435" fill="#94a3b8" font-size="10.5" text-anchor="middle">fetch technicians, generate slots</text>

    <rect x="450" y="455" width="160" height="50" rx="9" fill="#111827" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="530" y="475" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">book: Reserve Slot</text>
    <text x="530" y="492" fill="#fbbf24" font-size="10.5" text-anchor="middle">ON CONFLICT lock</text>

    <rect x="640" y="455" width="110" height="50" rx="9" fill="#0f1830" stroke="#f59e0b" stroke-width="1.6"/>
    <text x="695" y="479" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">Slot free?</text>

    <rect x="780" y="455" width="180" height="50" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="870" y="475" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">Create Calendar event</text>
    <text x="870" y="492" fill="#94a3b8" font-size="10.5" text-anchor="middle">Google Calendar</text>

    <rect x="990" y="455" width="170" height="50" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="1075" y="475" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">Return confirmed</text>
    <text x="1075" y="492" fill="#94a3b8" font-size="10.5" text-anchor="middle">confirmation_code</text>

    <rect x="640" y="525" width="180" height="46" rx="9" fill="#111827" stroke="#ef4444" stroke-width="1.4"/>
    <text x="730" y="545" fill="#e2e8f0" font-size="11.5" font-weight="700" text-anchor="middle">slot_unavailable</text>
    <text x="730" y="561" fill="#94a3b8" font-size="10.5" text-anchor="middle">offer a different time</text>

    <rect x="990" y="525" width="170" height="46" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="1075" y="545" fill="#e2e8f0" font-size="11.5" font-weight="700" text-anchor="middle">lookup / cancel</text>
    <text x="1075" y="561" fill="#94a3b8" font-size="10.5" text-anchor="middle">by phone: GCal + Postgres</text>
  </g>

  <g stroke="#f59e0b" stroke-width="2" fill="#f59e0b">
    <path d="M1072 188 L1072 200 L145 200 L145 442" fill="none"/><polygon points="145,446 141,438 149,438"/>
  </g>
  <text x="158" y="430" fill="#fbbf24" font-size="11">tool = gestionar_agenda_db</text>

  <g stroke="#475569" stroke-width="2" fill="#475569">
    <line x1="230" y1="475" x2="256" y2="475"/><polygon points="262,475 254,471 254,479"/>
    <path d="M412 462 L431 462 L431 423 L444 423" fill="none"/><polygon points="450,423 442,419 442,427"/>
    <path d="M412 480 L444 480" fill="none"/><polygon points="450,480 442,476 442,484"/>
    <line x1="610" y1="480" x2="634" y2="480"/><polygon points="640,480 632,476 632,484"/>
    <line x1="750" y1="480" x2="774" y2="480"/><polygon points="780,480 772,476 772,484"/>
    <line x1="960" y1="480" x2="984" y2="480"/><polygon points="990,480 982,476 982,484"/>
    <path d="M412 488 L431 488 L431 548 L984 548" fill="none"/><polygon points="990,548 982,544 982,552"/>
  </g>
  <g stroke="#ef4444" stroke-width="2" fill="#ef4444">
    <path d="M695 505 L695 522" fill="none"/><polygon points="695,525 691,517 699,517"/>
  </g>
  <text x="704" y="519" fill="#f87171" font-size="10">no</text>
  <text x="757" y="474" fill="#34d399" font-size="10">yes</text>

  <!-- ===================== BAND 4: Fault tolerance ===================== -->
  <rect x="24" y="606" width="1232" height="150" rx="12" fill="#170b0b" stroke="#1e293b"/>
  <rect x="24" y="606" width="5" height="150" rx="2" fill="#ef4444"/>
  <text x="44" y="632" fill="#f87171" font-size="13" font-weight="700">[04]  FAULT TOLERANCE AND AUDIT</text>

  <g>
    <rect x="44" y="648" width="320" height="86" rx="9" fill="#111827" stroke="#ef4444" stroke-width="1.5"/>
    <text x="204" y="678" fill="#e2e8f0" font-size="12.5" font-weight="700" text-anchor="middle">Every external node: onError</text>
    <text x="204" y="698" fill="#fca5a5" font-size="11.5" text-anchor="middle">controlled spoken fallback</text>
    <text x="204" y="716" fill="#94a3b8" font-size="10.5" text-anchor="middle">caller never hears an API error; call stays alive</text>

    <rect x="404" y="660" width="160" height="62" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="484" y="688" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">Error Logger Funnel</text>
    <text x="484" y="706" fill="#94a3b8" font-size="10.5" text-anchor="middle">build error context</text>

    <rect x="604" y="660" width="180" height="62" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="694" y="688" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">Log to Postgres</text>
    <text x="694" y="706" fill="#94a3b8" font-size="10.5" text-anchor="middle">calls + workflow_logs</text>

    <rect x="824" y="660" width="150" height="62" rx="9" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="899" y="688" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">Telegram alert</text>
    <text x="899" y="706" fill="#94a3b8" font-size="10.5" text-anchor="middle">real-time notify</text>

    <rect x="1014" y="660" width="200" height="62" rx="9" fill="#0f1830" stroke="#ef4444" stroke-width="1.6"/>
    <text x="1114" y="685" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">Global Error Handler</text>
    <text x="1114" y="703" fill="#94a3b8" font-size="10.5" text-anchor="middle">Error Trigger safety net</text>
  </g>

  <g stroke="#475569" stroke-width="2" fill="#475569">
    <line x1="564" y1="691" x2="598" y2="691"/><polygon points="604,691 596,687 596,695"/>
    <line x1="784" y1="691" x2="818" y2="691"/><polygon points="824,691 816,687 816,695"/>
    <line x1="974" y1="691" x2="1008" y2="691"/><polygon points="1014,691 1006,687 1006,695"/>
  </g>

  <g stroke="#ef4444" stroke-width="1.8" stroke-dasharray="5 4" fill="none">
    <path d="M530 505 L530 600 L484 600 L484 656"/>
  </g>
  <polygon points="484,660 480,652 488,652" fill="#ef4444"/>
  <text x="496" y="624" fill="#f87171" font-size="10.5">on error (any tool node)</text>

  <!-- legend -->
  <text x="44" y="800" fill="#64748b" font-size="11">External systems:</text>
  <g font-size="11" font-weight="700">
    <rect x="150" y="788" width="92" height="22" rx="11" fill="#0f1830" stroke="#38bdf8"/><text x="196" y="803" fill="#bae6fd" text-anchor="middle">Postgres</text>
    <rect x="252" y="788" width="92" height="22" rx="11" fill="#0a1410" stroke="#10b981"/><text x="298" y="803" fill="#a7f3d0" text-anchor="middle">Pinecone</text>
    <rect x="354" y="788" width="86" height="22" rx="11" fill="#0a1410" stroke="#34d399"/><text x="397" y="803" fill="#a7f3d0" text-anchor="middle">Gemini</text>
    <rect x="450" y="788" width="120" height="22" rx="11" fill="#15100a" stroke="#f59e0b"/><text x="510" y="803" fill="#fde68a" text-anchor="middle">Google Calendar</text>
    <rect x="580" y="788" width="86" height="22" rx="11" fill="#170b0b" stroke="#ef4444"/><text x="623" y="803" fill="#fecaca" text-anchor="middle">Telegram</text>
    <rect x="676" y="788" width="70" height="22" rx="11" fill="#0f1830" stroke="#6366f1"/><text x="711" y="803" fill="#c7d2fe" text-anchor="middle">Vapi</text>
  </g>

  <text x="1256" y="888" fill="#475569" font-size="10" text-anchor="end">ManoExperta voice agent - Vapi + n8n + Pinecone + Postgres + Google Calendar</text>
</svg>
